server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # index.html nunca cacheia — evita PWA preso em versão antiga (tela branca)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA + PWA — rotas client-side caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location ~* ^/workbox-.*\.js$ {
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Assets com hash podem cachear longo
    location /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /pwa/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # API na mesma origem — evita CORS entre app.* e apiclube.*
    location /api/ {
        proxy_pass https://apiclube.nutrisabellajardim.com.br/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host apiclube.nutrisabellajardim.com.br;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}
